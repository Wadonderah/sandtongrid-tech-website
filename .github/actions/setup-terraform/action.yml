name: Setup Terraform

description: Install Terraform with plugin caching, and run init in the given directory

inputs:
  working_directory:
    description: "Directory to run 'terraform init' in. Composite actions do NOT inherit the calling job's defaults.run.working-directory, so this must be passed explicitly."
    required: false
    default: "."

runs:
  using: composite

  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Cache Terraform Plugins
      uses: actions/cache@v4
      with:
        path: |
          ~/.terraform.d/plugin-cache
          ${{ inputs.working_directory }}/.terraform
        key: terraform-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working_directory)) }}
        restore-keys: |
          terraform-${{ runner.os }}

    - name: Enable Plugin Cache
      shell: bash
      run: |
        mkdir -p ~/.terraform.d
        echo "plugin_cache_dir=\"$HOME/.terraform.d/plugin-cache\"" > ~/.terraformrc
        mkdir -p ~/.terraform.d/plugin-cache

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init

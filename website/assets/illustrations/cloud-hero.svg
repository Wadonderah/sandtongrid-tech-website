  </defs>

  <circle cx="300" cy="260" r="230" fill="url(#glow)"/>

  <circle cx="300" cy="260" r="190" fill="none" stroke="#3a6ea5" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="4 8"/>
  <circle cx="300" cy="260" r="140" fill="none" stroke="#3a6ea5" stroke-opacity="0.35" stroke-width="1.5"/>

  <g stroke="#4da3ff" stroke-width="2" stroke-opacity="0.55">

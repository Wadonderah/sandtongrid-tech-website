      <stop offset="0%" stop-color="#4da3ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4da3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b3a63"/>
      <stop offset="100%" stop-color="#0d2544"/>

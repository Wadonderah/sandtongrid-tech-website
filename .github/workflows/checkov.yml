name: Terraform Security Scan (Checkov)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  checkov:
    name: Run Checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: |
            CKV_AWS_144,CKV_AWS_145,CKV2_AWS_62,CKV2_AWS_61,CKV_AWS_21,CKV_AWS_18,CKV_AWS_26,CKV_AWS_111,CKV_AWS_109,CKV_AWS_356,CKV_AWS_300,CKV2_AWS_31
          soft_fail: true
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif

name: Terraform Security Scan (Trivy)
#
# tfsec (the tool this replaced) was merged into Trivy by Aqua
# Security back in 2023/2024 and is now in maintenance-only mode —
# no new checks, and it may not correctly parse newer Terraform
# syntax. Trivy absorbed tfsec's entire check library (every
# AVD-AWS-xxxx ID carries over unchanged) and is the actively
# maintained tool going forward.

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Terraform Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "misconfig"
          format: "sarif"
          output: "trivy.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "1"

      - name: Upload SARIF Report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

    <line x1="300" y1="260" x2="490" y2="150"/>
    <line x1="300" y1="260" x2="110" y2="360"/>
    <line x1="300" y1="260" x2="480" y2="380"/>
    <line x1="300" y1="260" x2="300" y2="480"/>
  </g>


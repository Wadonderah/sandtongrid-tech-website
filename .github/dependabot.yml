version: 2
updates:
  - package-ecosystem: "terraform"
    directories:
      - "/environments/prod"
      - "/environments/dev"
      - "/environments/staging"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "terraform"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

name: Drift Detection

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  issues: write

defaults:
  run:
    working-directory: environments/prod

jobs:
  drift:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform
        with:
          working_directory: environments/prod

      - name: Terraform Plan (detect drift)
        id: plan
        run: |
          set +e
          terraform plan -var-file=terraform.tfvars -input=false -detailed-exitcode -no-color > plan_output.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Open Issue on Drift
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('environments/prod/plan_output.txt', 'utf8').slice(-60000);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Infrastructure drift detected — ${new Date().toISOString().slice(0,10)}`,
              body: `Scheduled drift check found differences between real infrastructure and Terraform state.\n\n\`\`\`\n${plan}\n\`\`\``,
              labels: ["drift", "terraform"]
            });

      - name: Fail if Terraform Plan Errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

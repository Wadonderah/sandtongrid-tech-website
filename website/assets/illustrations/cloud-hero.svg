  <g>
    <circle cx="120" cy="150" r="20" fill="#0d2544" stroke="#4da3ff" stroke-width="2"/>
    <rect x="111" y="141" width="18" height="18" rx="3" fill="none" stroke="#4da3ff" stroke-width="1.5"/>

    <circle cx="490" cy="150" r="20" fill="#0d2544" stroke="#FF9900" stroke-width="2"/>
    <path d="M482 154 h16 M482 148 h16 M482 160 h10" stroke="#FF9900" stroke-width="1.5" fill="none"/>


name: Setup Terraform

description: Install Terraform with plugin caching, and run init with proper backend handling

inputs:
  working_directory:
    description: "Directory to run 'terraform init' in"
    required: false
    default: "."
  skip_backend:
    description: "Skip backend initialization (use for validation only)"
    required: false
    default: "false"
  backend_config_file:
    description: "Path to backend configuration file"
    required: false
    default: ""
  backend_config:
    description: "Backend configuration arguments (space separated)"
    required: false
    default: ""

runs:
  using: composite

  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false

    - name: Cache Terraform Plugins
      uses: actions/cache@v4
      with:
        path: |
          ~/.terraform.d/plugin-cache
          ${{ inputs.working_directory }}/.terraform
        key: terraform-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working_directory)) }}
        restore-keys: |
          terraform-${{ runner.os }}

    - name: Enable Plugin Cache
      shell: bash
      run: |
        mkdir -p ~/.terraform.d
        echo "plugin_cache_dir=\"$HOME/.terraform.d/plugin-cache\"" > ~/.terraformrc
        mkdir -p ~/.terraform.d/plugin-cache

    - name: Terraform Init with Environment Variables
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        # Check for backend config via environment variables
        if [ -n "$TF_BACKEND_CONFIG" ]; then
          echo "🔧 Using backend config from TF_BACKEND_CONFIG"
          terraform init -backend-config="$TF_BACKEND_CONFIG"
        elif [ -f "backend.hcl" ]; then
          echo "🔧 Using backend.hcl file"
          terraform init -backend-config=backend.hcl
        elif [ -n "${{ inputs.backend_config_file }}" ]; then
          echo "�� Using backend config file: ${{ inputs.backend_config_file }}"
          terraform init -backend-config="${{ inputs.backend_config_file }}"
        elif [ "${{ inputs.skip_backend }}" = "true" ]; then
          echo "🔧 Running with -backend=false (validation mode)"
          terraform init -backend=false
        else
          echo "⚠️  No backend configuration provided. Running default init."
          terraform init
        fi

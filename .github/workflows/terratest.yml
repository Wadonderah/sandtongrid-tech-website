name: Terratest

on:
  pull_request:
    branches:
      - main
      - staging
      - develop
    paths:
      - "modules/**"
      - "environments/**"
      - "tests/**"
  push:
    branches:
      - main
    paths:
      - "modules/**"
      - "environments/**"
      - "tests/**"

permissions:
  id-token: write
  contents: read

jobs:

  # Runs on every PR unconditionally — no AWS credentials needed,
  # so this always executes even for contributors without account
  # access. Catches syntax errors, undeclared references, mismatched
  # module inputs/outputs.
  validate:
    name: Terraform Validate (no AWS creds required)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tests/go.sum

      - name: Download Go Modules
        working-directory: tests
        run: go mod tidy && go mod download

      - name: Run Validate Tests
        working-directory: tests
        run: go test -v -timeout 15m -run TestTerraformValidateEnvironments ./...

  # Runs a real (read-only) `terraform plan` against AWS. Requires
  # credentials, so it's gated behind the production Environment's
  # secrets and only runs on PRs targeting main / pushes to main —
  # dev and staging plans are cheap and low-risk enough to just run
  # every time via the same job.
  plan:
    name: Terraform Plan Tests
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tests/go.sum

      - name: Download Go Modules
        working-directory: tests
        run: go mod tidy && go mod download

      - name: Run Plan Tests
        working-directory: tests
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: go test -v -timeout 30m -run TestTerraformPlanEnvironments ./...
